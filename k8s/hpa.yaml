# Horizontal Pod Autoscaler for Consumer Deployment
# Scales the consumer deployment based on CPU/memory usage
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: iseries-otel-bridge-consumer-hpa
  namespace: observability
  labels:
    app: iseries-otel-bridge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: iseries-otel-bridge-consumer
  minReplicas: 2
  maxReplicas: 10
  metrics:
  # CPU-based scaling
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  # Memory-based scaling
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  # Kafka consumer lag based scaling (custom metric)
  # Note: Requires kube-state-metrics and custom metrics API
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
      - type: Percent
        value: 100
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 300
      - type: Percent
        value: 10
        periodSeconds: 300
---
# Alternative HPA for unified deployment when using consumer role
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: iseries-otel-bridge-hpa
  namespace: observability
  labels:
    app: iseries-otel-bridge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: iseries-otel-bridge
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
